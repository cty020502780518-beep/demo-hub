# application-local.yml - 本地开发配置
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:zhimeng-ai-console}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1

# MinIO 本地配置
s3:
  endpoint: ${OSS_ENDPOINT:http://localhost:9000}
  remoteEndpoint: ${OSS_REMOTE_ENDPOINT:http://localhost:9000}
  accessKey: ${OSS_ACCESS_KEY_ID:}
  secretKey: ${OSS_ACCESS_KEY_SECRET:}
  bucket: ${OSS_BUCKET_CONSOLE:console}

# LLM 配置
llm:
  max:
    input:
      tokens: ${LLM_MAX_INPUT_TOKENS:8000}
  api:
    url: ${LLM_API_URL:https://api.deepseek.com/v1}
    key: ${LLM_API_KEY:}
    model: ${LLM_API_MODEL:deepseek-chat}

# Workflow 本地服务地址
workflow:
  chatUrl: ${api.url.workflow}/api/v1/workflow/chat/stream
  debugUrl: ${api.url.workflow}/api/v1/workflow/chat/stream
  resumeUrl: ${api.url.workflow}/api/v1/workflow/chat/resume

api:
  url:
    workflow: ${WORKFLOW_URL:http://127.0.0.1:7880}

# Common 通用配置（用于 Workflow 节点的默认 AK/SK）
common:
  appid: ${SPARK_APP_ID:}
  apiKey: ${SPARK_API_KEY:}
  apiSecret: ${SPARK_API_SECRET:}
  apiPassword: ${SPARK_API_PASSWORD:}
  imgAppid: ${SPARK_IMAGE_APP_ID:}
  imgApiKey: ${SPARK_IMAGE_API_KEY:}
  imgApiSecret: ${SPARK_IMAGE_API_SECRET:}

# MAAS 工作流本地配置（直连 Python workflow 服务）
maas:
  appId: ${common.appid}
  apiKey: ${common.apiKey}
  apiSecret: ${common.apiSecret}
  synchronizeWorkFlow: http://localhost:8080/workflow
  cloneWorkFlow: http://localhost:8080/workflow/internal-clone
  getInputs: http://localhost:8080/workflow/get-inputs-info
  canPublishUrl: http://localhost:8080/workflow/can-publish
  publishApi: ${api.url.workflow}/workflow/v1/publish
  authApi: ${api.url.workflow}/workflow/v1/auth
  mcpRegister: http://localhost:8080/workflow/release
  workflowConfig: http://localhost:8080/workflow/get-flow-advanced-config
  workflowVersion: http://localhost:8080/workflow/version
  publish: http://localhost:8080/workflow/publish
  consumerId: ${MAAS_CONSUMER_ID:}
  consumerKey: ${MAAS_CONSUMER_KEY:}
  consumerSecret: ${MAAS_CONSUMER_SECRET:}
