services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  # MySQL Database
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: zhimeng-ai-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: zhimeng-ai-console
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount MySQL configuration
      - ./mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
      # Mount initialization scripts
      - ./mysql:/docker-entrypoint-initdb.d
    networks:
      - zhimeng-ai-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: docker.m.daocloud.io/library/redis:7
    container_name: zhimeng-ai-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    networks:
      - zhimeng-ai-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: zhimeng-ai-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - zhimeng-ai-network
    restart: always
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Application Services
  # ============================================================================

  # Console Frontend
  console-frontend:
    build:
      context: ../../
      dockerfile: docker/zhimeng-ai/Dockerfile.frontend
    container_name: zhimeng-ai-console-frontend
    environment:
      NGINX_PORT: 1881
      # Configuration for runtime-config.js
      CONSOLE_API_URL: /console-api
      # Adjust these if you have authentication set up
      CONSOLE_CASDOOR_URL: ""
      CONSOLE_CASDOOR_ID: ""
    ports:
      - "3000:1881"
    depends_on:
      console-hub:
        condition: service_healthy
    networks:
      - zhimeng-ai-network
    restart: always

  # Console Backend (Hub)
  console-hub:
    build:
      context: ../../
      dockerfile: docker/zhimeng-ai/Dockerfile.backend
    container_name: zhimeng-ai-console-hub
    environment:
      # Database
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: zhimeng-ai-console
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      
      # MinIO
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      OSS_BUCKET_CONSOLE: console
      
      # Integration with Workflow
      WORKFLOW_CHAT_URL: http://core-workflow-java:7880/api/v1/workflow/chat/stream
      WORKFLOW_URL: http://core-workflow-java:7880
      
      # Other settings
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - zhimeng-ai-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Core Workflow Java
  core-workflow-java:
    build:
      context: ../../
      dockerfile: docker/zhimeng-ai/Dockerfile.workflow
    container_name: zhimeng-ai-core-workflow-java
    environment:
      # Database
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: zhimeng-ai-workflow
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      
      # Integration with Console
      MODEL_SERVICE_URL: http://console-hub:8080
      
      # MinIO
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      
      SERVER_PORT: 7880
    ports:
      - "7880:7880"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - zhimeng-ai-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7880/actuator/health/readiness >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

networks:
  zhimeng-ai-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
