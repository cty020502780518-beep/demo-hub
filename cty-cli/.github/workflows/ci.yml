name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: py_compile check
        run: |
          python -m py_compile main.py agent.py tools.py config.py memory.py permissions.py security.py trace.py context.py plan.py skills.py ui.py
          python -m py_compile providers/__init__.py providers/base.py providers/anthropic.py providers/openai_compat.py

      - name: Run tests (mock only, no real API keys)
        env:
          DEEPSEEK_API_KEY: test-mock-key
          ANTHROPIC_API_KEY: test-mock-key
          OPENAI_API_KEY: test-mock-key
        run: python -m pytest tests/ -v --tb=short

      - name: Version check
        run: python main.py --version
